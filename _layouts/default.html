<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        line-height: 1.7;
        color: #222;
        background: #fff;
      }
      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem 1rem 3rem;
      }
      h1, h2 {
        line-height: 1.3;
      }
      a {
        color: #0a58ca;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .site-description {
        margin: 0.5rem 0 1.5rem;
      }
      .search-box {
        width: 100%;
        box-sizing: border-box;
        padding: 0.6rem 0.75rem;
        border: 1px solid #bbb;
        border-radius: 6px;
        font-size: 1rem;
        margin: 0 0 1.5rem;
      }
      .category-group {
        margin-bottom: 1.5rem;
      }
      .category-group h2 {
        margin: 0 0 0.5rem;
      }
      .category-group ul {
        margin: 0;
        padding-left: 1.2rem;
      }
      .no-results {
        color: #666;
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <main>
      {{ content }}
    </main>
  </body>
</html>
